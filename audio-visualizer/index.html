<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIYA — Audio Visualizer</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#000;font-family:'Helvetica Neue',sans-serif}
canvas{display:block}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;pointer-events:none}
#startBtn{pointer-events:all;padding:1.2rem 3rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);font-size:0.8rem;letter-spacing:0.5rem;text-transform:uppercase;cursor:pointer;transition:all 0.3s;border-radius:50px;backdrop-filter:blur(10px)}
#startBtn:hover{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.5)}
#startBtn.hidden{opacity:0;pointer-events:none}
#info{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.25);font-size:0.6rem;letter-spacing:0.4rem;pointer-events:none}
#dropzone{position:fixed;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);z-index:20;color:rgba(255,255,255,0.6);font-size:1rem;letter-spacing:0.3rem}
</style>
</head>
<body>
<div id="ui"><button id="startBtn">USE MICROPHONE</button></div>
<div id="info">OR DROP AN AUDIO FILE</div>
<div id="dropzone">DROP AUDIO FILE</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const dropzone = document.getElementById('dropzone');
const info = document.getElementById('info');

let W, H, audioCtx, analyser, dataArray, freqArray, source;
let isRunning = false;
let hueOffset = 0;
let history = [];
const HISTORY_LEN = 80;

function resize() {
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
}
window.addEventListener('resize', resize);
resize();

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.82;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  freqArray = new Uint8Array(analyser.frequencyBinCount);
}

startBtn.addEventListener('click', async () => {
  initAudio();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    startBtn.classList.add('hidden');
    info.style.display = 'none';
    isRunning = true;
  } catch(e) {
    startBtn.textContent = 'MIC ACCESS DENIED';
  }
});

// Drag & drop audio file
document.addEventListener('dragover', e => { e.preventDefault(); dropzone.style.display = 'flex'; });
document.addEventListener('dragleave', e => { if(e.relatedTarget === null) dropzone.style.display = 'none'; });
document.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.style.display = 'none';
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('audio')) return;
  if (!audioCtx) initAudio();
  const reader = new FileReader();
  reader.onload = () => {
    audioCtx.decodeAudioData(reader.result, buffer => {
      if (source) source.disconnect();
      source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(analyser);
      analyser.connect(audioCtx.destination);
      source.loop = true;
      source.start(0);
      startBtn.classList.add('hidden');
      info.style.display = 'none';
      isRunning = true;
    });
  };
  reader.readAsArrayBuffer(file);
});

function getAvg(arr, from, to) {
  let sum = 0;
  const f = Math.floor(from), t = Math.min(Math.floor(to), arr.length);
  for (let i = f; i < t; i++) sum += arr[i];
  return sum / (t - f || 1);
}

function render(time) {
  requestAnimationFrame(render);
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(0, 0, W, H);

  if (!isRunning) return;

  analyser.getByteFrequencyData(freqArray);
  analyser.getByteTimeDomainData(dataArray);

  const bass = getAvg(freqArray, 0, 10) / 255;
  const mid = getAvg(freqArray, 10, 100) / 255;
  const high = getAvg(freqArray, 100, 400) / 255;
  const overall = (bass + mid + high) / 3;

  hueOffset += 0.3 + overall * 2;

  // Store history
  const snapshot = new Float32Array(128);
  for (let i = 0; i < 128; i++) snapshot[i] = freqArray[i] / 255;
  history.push(snapshot);
  if (history.length > HISTORY_LEN) history.shift();

  const cx = W / 2, cy = H / 2;

  // 1. Circular frequency bars
  const bars = 180;
  for (let i = 0; i < bars; i++) {
    const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
    const fi = Math.floor((i / bars) * 128);
    const val = freqArray[fi] / 255;
    const r = Math.min(W, H) * 0.15 + bass * 30;
    const len = val * Math.min(W, H) * 0.25;
    const x1 = cx + Math.cos(angle) * r;
    const y1 = cy + Math.sin(angle) * r;
    const x2 = cx + Math.cos(angle) * (r + len);
    const y2 = cy + Math.sin(angle) * (r + len);

    const hue = (hueOffset + i * 2) % 360;
    ctx.strokeStyle = `hsla(${hue}, 80%, ${50 + val * 30}%, ${0.5 + val * 0.5})`;
    ctx.lineWidth = 2 * devicePixelRatio;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  // 2. Inner ring glow
  const ringR = Math.min(W, H) * 0.15 + bass * 30;
  const grad = ctx.createRadialGradient(cx, cy, ringR * 0.5, cx, cy, ringR * 1.2);
  const hue1 = (hueOffset + 180) % 360;
  grad.addColorStop(0, `hsla(${hue1}, 70%, 50%, ${0.1 + bass * 0.3})`);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, ringR * 1.2, 0, Math.PI * 2);
  ctx.fill();

  // 3. Waveform ring
  ctx.strokeStyle = `hsla(${(hueOffset+90)%360}, 60%, 70%, 0.4)`;
  ctx.lineWidth = 1.5 * devicePixelRatio;
  ctx.beginPath();
  for (let i = 0; i < dataArray.length; i++) {
    const angle = (i / dataArray.length) * Math.PI * 2;
    const val = (dataArray[i] - 128) / 128;
    const r = ringR + val * 50 * (1 + bass);
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();

  // 4. Particle burst on bass hits
  if (bass > 0.7) {
    const count = Math.floor(bass * 20);
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = ringR + Math.random() * Math.min(W,H) * 0.3;
      const size = (2 + Math.random() * 4) * devicePixelRatio;
      const hue = (hueOffset + Math.random() * 60) % 360;
      ctx.fillStyle = `hsla(${hue}, 90%, 70%, ${0.5 + Math.random()*0.5})`;
      ctx.beginPath();
      ctx.arc(cx + Math.cos(angle)*dist, cy + Math.sin(angle)*dist, size, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // 5. 3D history mountain (back to front)
  for (let h = 0; h < history.length; h++) {
    const snap = history[h];
    const alpha = (h / history.length) * 0.3;
    const yOff = H * 0.85 - (h / history.length) * H * 0.35;
    const hue = (hueOffset - h * 3 + 200) % 360;

    ctx.strokeStyle = `hsla(${hue}, 60%, 50%, ${alpha})`;
    ctx.lineWidth = 1 * devicePixelRatio;
    ctx.beginPath();
    for (let i = 0; i < 128; i++) {
      const x = (i / 127) * W;
      const y = yOff - snap[i] * H * 0.12;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // 6. Bass pulse background
  if (bass > 0.5) {
    ctx.fillStyle = `hsla(${hueOffset%360}, 80%, 50%, ${(bass-0.5)*0.06})`;
    ctx.fillRect(0, 0, W, H);
  }
}

requestAnimationFrame(render);
</script>
</body>
</html>
