<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIYA — Gravity Playground</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#050510;cursor:crosshair}
canvas{display:block}
#info{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);font-family:'Helvetica Neue',sans-serif;font-size:0.6rem;letter-spacing:0.4rem;color:rgba(255,255,255,0.3);pointer-events:none;z-index:10;text-align:center;line-height:2}
#controls{position:fixed;top:2rem;right:2rem;display:flex;flex-direction:column;gap:0.5rem;z-index:10}
button{padding:0.5rem 1rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);font-family:'Helvetica Neue',sans-serif;font-size:0.55rem;letter-spacing:0.2rem;cursor:pointer;border-radius:20px;transition:all 0.3s}
button:hover{background:rgba(255,255,255,0.15);color:#fff}
</style>
</head>
<body>
<div id="info">CLICK TO PLACE · DRAG TO LAUNCH · SCROLL TO RESIZE</div>
<div id="controls">
  <button onclick="clearAll()">CLEAR</button>
  <button onclick="addPreset('solar')">SOLAR SYSTEM</button>
  <button onclick="addPreset('binary')">BINARY STAR</button>
  <button onclick="toggleTrails()">TRAILS</button>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const G = 0.5;
let bodies = [];
let showTrails = true;
let placing = false;
let placeX = 0, placeY = 0;
let placeSize = 15;
let dragX = 0, dragY = 0;

const COLORS = [
  '#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#9b59b6',
  '#ff8c42','#00d2d3','#ff9ff3','#54a0ff','#5f27cd'
];

class Body {
  constructor(x, y, mass, vx, vy, color) {
    this.x = x; this.y = y;
    this.mass = mass;
    this.vx = vx || 0; this.vy = vy || 0;
    this.radius = Math.pow(mass, 0.4) * 2;
    this.color = color || COLORS[Math.floor(Math.random()*COLORS.length)];
    this.trail = [];
    this.alive = true;
  }
}

canvas.addEventListener('mousedown', e => {
  placing = true;
  placeX = e.clientX;
  placeY = e.clientY;
  dragX = e.clientX;
  dragY = e.clientY;
});

canvas.addEventListener('mousemove', e => {
  if (placing) {
    dragX = e.clientX;
    dragY = e.clientY;
  }
});

canvas.addEventListener('mouseup', e => {
  if (!placing) return;
  placing = false;
  const vx = (placeX - e.clientX) * 0.05;
  const vy = (placeY - e.clientY) * 0.05;
  const mass = placeSize * placeSize * 0.5;
  bodies.push(new Body(placeX, placeY, mass, vx, vy));
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  placeSize = Math.max(3, Math.min(80, placeSize + (e.deltaY > 0 ? -2 : 2)));
}, { passive: false });

function clearAll() { bodies = []; }

function toggleTrails() { showTrails = !showTrails; }

function addPreset(type) {
  bodies = [];
  const cx = W/2, cy = H/2;
  if (type === 'solar') {
    bodies.push(new Body(cx, cy, 3000, 0, 0, '#ffd93d'));
    const dists = [80, 120, 180, 260, 350];
    const masses = [5, 8, 15, 40, 25];
    for (let i = 0; i < 5; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.sqrt(G * 3000 / dists[i]) * 0.8;
      bodies.push(new Body(
        cx + Math.cos(angle)*dists[i],
        cy + Math.sin(angle)*dists[i],
        masses[i],
        -Math.sin(angle)*speed,
        Math.cos(angle)*speed,
        COLORS[i+2]
      ));
    }
  } else if (type === 'binary') {
    const d = 80;
    const speed = Math.sqrt(G * 800 / (d*2)) * 0.6;
    bodies.push(new Body(cx-d, cy, 800, 0, speed, '#ff6b6b'));
    bodies.push(new Body(cx+d, cy, 800, 0, -speed, '#4d96ff'));
    for (let i = 0; i < 30; i++) {
      const angle = Math.random()*Math.PI*2;
      const dist = 200 + Math.random()*200;
      const orbSpeed = Math.sqrt(G*1600/dist)*0.6;
      bodies.push(new Body(
        cx+Math.cos(angle)*dist, cy+Math.sin(angle)*dist,
        1+Math.random()*3,
        -Math.sin(angle)*orbSpeed, Math.cos(angle)*orbSpeed
      ));
    }
  }
}

function step() {
  const dt = 0.8;
  // Gravity
  for (let i = 0; i < bodies.length; i++) {
    const a = bodies[i];
    if (!a.alive) continue;
    for (let j = i+1; j < bodies.length; j++) {
      const b = bodies[j];
      if (!b.alive) continue;
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const d2 = dx*dx + dy*dy + 100; // softening
      const d = Math.sqrt(d2);
      const f = G * a.mass * b.mass / d2;
      const fx = f * dx / d;
      const fy = f * dy / d;
      a.vx += fx / a.mass * dt;
      a.vy += fy / a.mass * dt;
      b.vx -= fx / b.mass * dt;
      b.vy -= fy / b.mass * dt;

      // Merge if overlapping
      if (d < a.radius + b.radius) {
        const total = a.mass + b.mass;
        a.vx = (a.vx*a.mass + b.vx*b.mass) / total;
        a.vy = (a.vy*a.mass + b.vy*b.mass) / total;
        a.x = (a.x*a.mass + b.x*b.mass) / total;
        a.y = (a.y*a.mass + b.y*b.mass) / total;
        a.mass = total;
        a.radius = Math.pow(total, 0.4) * 2;
        b.alive = false;
      }
    }
  }

  bodies = bodies.filter(b => b.alive);

  for (const b of bodies) {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 300) b.trail.shift();
  }
}

function draw() {
  ctx.fillStyle = 'rgba(5,5,16,0.2)';
  ctx.fillRect(0, 0, W, H);

  // Trails
  if (showTrails) {
    for (const b of bodies) {
      if (b.trail.length < 2) continue;
      ctx.beginPath();
      for (let i = 0; i < b.trail.length; i++) {
        const t = b.trail[i];
        if (i === 0) ctx.moveTo(t.x, t.y);
        else ctx.lineTo(t.x, t.y);
      }
      ctx.strokeStyle = b.color + '30';
      ctx.lineWidth = Math.max(1, b.radius * 0.3);
      ctx.stroke();
    }
  }

  // Bodies
  for (const b of bodies) {
    // Glow
    const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.radius * 4);
    grad.addColorStop(0, b.color + '40');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius * 4, 0, Math.PI*2);
    ctx.fill();

    // Body
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
    ctx.fillStyle = b.color;
    ctx.fill();
  }

  // Placing preview
  if (placing) {
    const r = Math.pow(placeSize*placeSize*0.5, 0.4)*2;
    ctx.beginPath();
    ctx.arc(placeX, placeY, r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Velocity arrow
    ctx.beginPath();
    ctx.moveTo(placeX, placeY);
    ctx.lineTo(dragX, dragY);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.stroke();
  }
}

function loop() {
  step();
  draw();
  requestAnimationFrame(loop);
}

// Start with solar system
addPreset('solar');
loop();
</script>
</body>
</html>
