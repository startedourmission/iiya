<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIYA — Fluid Sim</title>
<style>
* { margin: 0; padding: 0; }
body { overflow: hidden; background: #000; cursor: crosshair; }
canvas { display: block; width: 100vw; height: 100vh; }
#hint {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  font-family: 'Helvetica Neue', sans-serif;
  font-size: 0.65rem; letter-spacing: 0.5rem; text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  pointer-events: none; z-index: 10;
  transition: opacity 2s; opacity: 1;
}
#hint.hide { opacity: 0; }
</style>
</head>
<body>
<div id="hint">drag to paint</div>
<canvas id="c"></canvas>
<script>
'use strict';

const canvas = document.getElementById('c');
const hint = document.getElementById('hint');

// WebGL setup
const params = { alpha: false, depth: false, stencil: false, antialias: false, preserveDrawingBuffer: false };
let gl = canvas.getContext('webgl2', params);
const isWebGL2 = !!gl;
if (!gl) gl = canvas.getContext('webgl', params);
if (!gl) { document.body.innerHTML = '<p style="color:white;text-align:center;margin-top:40vh">WebGL not supported</p>'; }

// Extensions
let halfFloatExt, supportLinearFiltering;
if (isWebGL2) {
  gl.getExtension('EXT_color_buffer_float');
  supportLinearFiltering = gl.getExtension('OES_texture_float_linear');
} else {
  halfFloatExt = gl.getExtension('OES_texture_half_float');
  supportLinearFiltering = gl.getExtension('OES_texture_half_float_linear');
}

const halfFloatType = isWebGL2 ? gl.HALF_FLOAT : (halfFloatExt ? halfFloatExt.HALF_FLOAT_OES : gl.FLOAT);
const formatRGBA = isWebGL2 ? { internalFormat: gl.RGBA16F, format: gl.RGBA } : { internalFormat: gl.RGBA, format: gl.RGBA };
const formatRG = isWebGL2 ? { internalFormat: gl.RG16F, format: gl.RG } : { internalFormat: gl.RGBA, format: gl.RGBA };
const formatR = isWebGL2 ? { internalFormat: gl.R16F, format: gl.RED } : { internalFormat: gl.RGBA, format: gl.RGBA };

const filtering = supportLinearFiltering ? gl.LINEAR : gl.NEAREST;

// Sim config
const SIM_RES = 256;
const DYE_RES = 1024;
const PRESSURE_ITERATIONS = 20;
const CURL_STRENGTH = 30;
const SPLAT_RADIUS = 0.25;

let simW, simH, dyeW, dyeH;

// --- Shaders ---
function compileShader(type, source) {
  const prefix = isWebGL2
    ? '#version 300 es\nprecision highp float;\nprecision highp sampler2D;\n'
    : 'precision highp float;\nprecision highp sampler2D;\n';
  const s = gl.createShader(type);
  gl.shaderSource(s, prefix + source);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}

const baseVert = isWebGL2
  ? `in vec2 aPosition;
     out vec2 vUv;
     out vec2 vL; out vec2 vR; out vec2 vT; out vec2 vB;
     uniform vec2 texelSize;
     void main(){
       vUv = aPosition * 0.5 + 0.5;
       vL = vUv - vec2(texelSize.x, 0.0);
       vR = vUv + vec2(texelSize.x, 0.0);
       vT = vUv + vec2(0.0, texelSize.y);
       vB = vUv - vec2(0.0, texelSize.y);
       gl_Position = vec4(aPosition, 0.0, 1.0);
     }`
  : `attribute vec2 aPosition;
     varying vec2 vUv;
     varying vec2 vL; varying vec2 vR; varying vec2 vT; varying vec2 vB;
     uniform vec2 texelSize;
     void main(){
       vUv = aPosition * 0.5 + 0.5;
       vL = vUv - vec2(texelSize.x, 0.0);
       vR = vUv + vec2(texelSize.x, 0.0);
       vT = vUv + vec2(0.0, texelSize.y);
       vB = vUv - vec2(0.0, texelSize.y);
       gl_Position = vec4(aPosition, 0.0, 1.0);
     }`;

const out_color = isWebGL2 ? 'out vec4 fragColor;' : '';
const FC = isWebGL2 ? 'fragColor' : 'gl_FragColor';
const IN = isWebGL2 ? 'in' : 'varying';
const TEX = 'texture';

function createProgram(fragSource) {
  const vs = compileShader(gl.VERTEX_SHADER, baseVert);
  const fs = compileShader(gl.FRAGMENT_SHADER, fragSource);
  const p = gl.createProgram();
  gl.attachShader(p, vs); gl.attachShader(p, fs);
  gl.bindAttribLocation(p, 0, 'aPosition');
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(p));
  const uniforms = {};
  const n = gl.getProgramParameter(p, gl.ACTIVE_UNIFORMS);
  for (let i = 0; i < n; i++) {
    const u = gl.getActiveUniform(p, i);
    uniforms[u.name] = gl.getUniformLocation(p, u.name);
  }
  return { program: p, uniforms };
}

// Fragment shaders
const splatShader = createProgram(`
  ${IN} vec2 vUv;
  ${out_color}
  uniform sampler2D uTarget;
  uniform float aspectRatio;
  uniform vec3 color;
  uniform vec2 point;
  uniform float radius;
  void main(){
    vec2 p = vUv - point;
    p.x *= aspectRatio;
    vec3 splat = exp(-dot(p,p) / radius) * color;
    vec3 base = ${TEX}(uTarget, vUv).xyz;
    ${FC} = vec4(base + splat, 1.0);
  }
`);

const curlShader = createProgram(`
  ${IN} vec2 vL; ${IN} vec2 vR; ${IN} vec2 vT; ${IN} vec2 vB;
  ${out_color}
  uniform sampler2D uVelocity;
  void main(){
    float L = ${TEX}(uVelocity, vL).y;
    float R = ${TEX}(uVelocity, vR).y;
    float T = ${TEX}(uVelocity, vT).x;
    float B = ${TEX}(uVelocity, vB).x;
    float vorticity = R - L - T + B;
    ${FC} = vec4(0.5 * vorticity, 0.0, 0.0, 1.0);
  }
`);

const vorticityShader = createProgram(`
  ${IN} vec2 vUv;
  ${IN} vec2 vL; ${IN} vec2 vR; ${IN} vec2 vT; ${IN} vec2 vB;
  ${out_color}
  uniform sampler2D uVelocity;
  uniform sampler2D uCurl;
  uniform float curl;
  uniform float dt;
  void main(){
    float L = ${TEX}(uCurl, vL).x;
    float R = ${TEX}(uCurl, vR).x;
    float T = ${TEX}(uCurl, vT).x;
    float B = ${TEX}(uCurl, vB).x;
    float C = ${TEX}(uCurl, vUv).x;
    vec2 force = 0.5 * vec2(abs(T) - abs(B), abs(R) - abs(L));
    force /= length(force) + 0.0001;
    force *= curl * C;
    force.y *= -1.0;
    vec2 vel = ${TEX}(uVelocity, vUv).xy;
    vel += force * dt;
    vel = min(max(vel, -1000.0), 1000.0);
    ${FC} = vec4(vel, 0.0, 1.0);
  }
`);

const divergenceShader = createProgram(`
  ${IN} vec2 vL; ${IN} vec2 vR; ${IN} vec2 vT; ${IN} vec2 vB;
  ${out_color}
  uniform sampler2D uVelocity;
  void main(){
    float L = ${TEX}(uVelocity, vL).x;
    float R = ${TEX}(uVelocity, vR).x;
    float T = ${TEX}(uVelocity, vT).y;
    float B = ${TEX}(uVelocity, vB).y;
    float div = 0.5 * (R - L + T - B);
    ${FC} = vec4(div, 0.0, 0.0, 1.0);
  }
`);

const clearShader = createProgram(`
  ${IN} vec2 vUv;
  ${out_color}
  uniform sampler2D uTexture;
  uniform float value;
  void main(){
    ${FC} = value * ${TEX}(uTexture, vUv);
  }
`);

const pressureShader = createProgram(`
  ${IN} vec2 vUv;
  ${IN} vec2 vL; ${IN} vec2 vR; ${IN} vec2 vT; ${IN} vec2 vB;
  ${out_color}
  uniform sampler2D uPressure;
  uniform sampler2D uDivergence;
  void main(){
    float L = ${TEX}(uPressure, vL).x;
    float R = ${TEX}(uPressure, vR).x;
    float T = ${TEX}(uPressure, vT).x;
    float B = ${TEX}(uPressure, vB).x;
    float C = ${TEX}(uDivergence, vUv).x;
    float pressure = (L + R + B + T - C) * 0.25;
    ${FC} = vec4(pressure, 0.0, 0.0, 1.0);
  }
`);

const gradientSubtractShader = createProgram(`
  ${IN} vec2 vUv;
  ${IN} vec2 vL; ${IN} vec2 vR; ${IN} vec2 vT; ${IN} vec2 vB;
  ${out_color}
  uniform sampler2D uPressure;
  uniform sampler2D uVelocity;
  void main(){
    float L = ${TEX}(uPressure, vL).x;
    float R = ${TEX}(uPressure, vR).x;
    float T = ${TEX}(uPressure, vT).x;
    float B = ${TEX}(uPressure, vB).x;
    vec2 vel = ${TEX}(uVelocity, vUv).xy;
    vel -= vec2(R - L, T - B);
    ${FC} = vec4(vel, 0.0, 1.0);
  }
`);

const advectionShader = createProgram(`
  ${IN} vec2 vUv;
  ${out_color}
  uniform sampler2D uVelocity;
  uniform sampler2D uSource;
  uniform vec2 texelSize;
  uniform float dt;
  uniform float dissipation;
  void main(){
    vec2 coord = vUv - dt * ${TEX}(uVelocity, vUv).xy * texelSize;
    vec3 result = ${TEX}(uSource, coord).xyz;
    ${FC} = vec4(result * dissipation, 1.0);
  }
`);

const displayShader = createProgram(`
  ${IN} vec2 vUv;
  ${out_color}
  uniform sampler2D uTexture;
  void main(){
    vec3 c = ${TEX}(uTexture, vUv).rgb;
    // Tone mapping for rich colors
    c = pow(c, vec3(0.85));
    // Slight bloom feel
    float lum = dot(c, vec3(0.299, 0.587, 0.114));
    c += c * smoothstep(0.5, 1.5, lum) * 0.3;
    ${FC} = vec4(c, 1.0);
  }
`);

// Quad
const quad = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quad);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, -1,1, 1,1, 1,-1]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

// FBO
function createFBO(w, h, intFmt, fmt, type, filter) {
  gl.activeTexture(gl.TEXTURE0);
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, intFmt, w, h, 0, fmt, type, null);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.viewport(0, 0, w, h);
  gl.clear(gl.COLOR_BUFFER_BIT);
  return { texture: tex, fbo, width: w, height: h,
    attach(id) { gl.activeTexture(gl.TEXTURE0 + id); gl.bindTexture(gl.TEXTURE_2D, tex); return id; }
  };
}

function createDoubleFBO(w, h, intFmt, fmt, type, filter) {
  let fbo1 = createFBO(w, h, intFmt, fmt, type, filter);
  let fbo2 = createFBO(w, h, intFmt, fmt, type, filter);
  return {
    width: w, height: h,
    get read() { return fbo1; },
    set read(v) { fbo1 = v; },
    get write() { return fbo2; },
    set write(v) { fbo2 = v; },
    swap() { const t = fbo1; fbo1 = fbo2; fbo2 = t; }
  };
}

function resCalc(res) {
  const aspect = gl.canvas.width / gl.canvas.height;
  let h = res, w = Math.round(h * aspect);
  return { w, h };
}

let velocity, dye, curl, divergence, pressure;

function initFBOs() {
  const s = resCalc(SIM_RES);
  const d = resCalc(DYE_RES);
  simW = s.w; simH = s.h; dyeW = d.w; dyeH = d.h;
  velocity = createDoubleFBO(simW, simH, formatRG.internalFormat, formatRG.format, halfFloatType, filtering);
  dye = createDoubleFBO(dyeW, dyeH, formatRGBA.internalFormat, formatRGBA.format, halfFloatType, filtering);
  curl = createFBO(simW, simH, formatR.internalFormat, formatR.format, halfFloatType, gl.NEAREST);
  divergence = createFBO(simW, simH, formatR.internalFormat, formatR.format, halfFloatType, gl.NEAREST);
  pressure = createDoubleFBO(simW, simH, formatR.internalFormat, formatR.format, halfFloatType, gl.NEAREST);
}

function blit(target) {
  if (target == null) {
    gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  } else {
    gl.viewport(0, 0, target.width, target.height);
    gl.bindFramebuffer(gl.FRAMEBUFFER, target.fbo);
  }
  gl.drawArrays(gl.TRIANGLE_FAN, 0, 4);
}

// Resize
function resize() {
  const dpr = Math.min(window.devicePixelRatio, 2);
  canvas.width = Math.round(window.innerWidth * dpr);
  canvas.height = Math.round(window.innerHeight * dpr);
  initFBOs();
}
window.addEventListener('resize', resize);
resize();

// --- Input ---
let pointers = [{ id: -1, x: 0, y: 0, dx: 0, dy: 0, down: false, moved: false, color: [0,0,0] }];

function getPointer(id) {
  let p = pointers.find(p => p.id === id);
  if (!p) { p = { id, x: 0, y: 0, dx: 0, dy: 0, down: false, moved: false, color: [0,0,0] }; pointers.push(p); }
  return p;
}

function updatePointer(p, x, y) {
  p.dx = (x - p.x) * 5.0;
  p.dy = (y - p.y) * 5.0;
  p.x = x; p.y = y;
  p.moved = Math.abs(p.dx) > 0 || Math.abs(p.dy) > 0;
}

function randomColor() {
  const h = Math.random() * 360;
  const s = 0.7 + Math.random() * 0.3;
  const l = 0.5 + Math.random() * 0.2;
  // HSL to RGB
  const c = (1 - Math.abs(2*l - 1)) * s;
  const x = c * (1 - Math.abs((h/60)%2 - 1));
  const m = l - c/2;
  let r,g,b;
  if (h<60){r=c;g=x;b=0}else if(h<120){r=x;g=c;b=0}else if(h<180){r=0;g=c;b=x}
  else if(h<240){r=0;g=x;b=c}else if(h<300){r=x;g=0;b=c}else{r=c;g=0;b=x}
  return [(r+m)*0.8, (g+m)*0.8, (b+m)*0.8];
}

canvas.addEventListener('mousedown', e => {
  const p = getPointer(-1);
  p.down = true;
  p.color = randomColor();
  updatePointer(p, e.offsetX / canvas.clientWidth, 1.0 - e.offsetY / canvas.clientHeight);
  hint.classList.add('hide');
});
canvas.addEventListener('mousemove', e => {
  const p = getPointer(-1);
  updatePointer(p, e.offsetX / canvas.clientWidth, 1.0 - e.offsetY / canvas.clientHeight);
});
window.addEventListener('mouseup', () => { getPointer(-1).down = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  hint.classList.add('hide');
  for (const t of e.changedTouches) {
    const p = getPointer(t.identifier);
    p.down = true;
    p.color = randomColor();
    updatePointer(p, t.clientX / canvas.clientWidth, 1.0 - t.clientY / canvas.clientHeight);
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const p = getPointer(t.identifier);
    updatePointer(p, t.clientX / canvas.clientWidth, 1.0 - t.clientY / canvas.clientHeight);
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) getPointer(t.identifier).down = false;
});

// Auto splats on start
function autoSplat() {
  for (let i = 0; i < 5; i++) {
    const x = Math.random();
    const y = Math.random();
    const dx = (Math.random() - 0.5) * 1000;
    const dy = (Math.random() - 0.5) * 1000;
    const color = randomColor();
    splat(x, y, dx, dy, color);
  }
}

// --- Sim ---
function useProgram(p) {
  gl.useProgram(p.program);
}

function splat(x, y, dx, dy, color) {
  useProgram(splatShader);
  gl.uniform1i(splatShader.uniforms.uTarget, velocity.read.attach(0));
  gl.uniform1f(splatShader.uniforms.aspectRatio, canvas.width / canvas.height);
  gl.uniform2f(splatShader.uniforms.point, x, y);
  gl.uniform3f(splatShader.uniforms.color, dx, dy, 0.0);
  gl.uniform1f(splatShader.uniforms.radius, SPLAT_RADIUS / 100.0);
  blit(velocity.write);
  velocity.swap();

  gl.uniform1i(splatShader.uniforms.uTarget, dye.read.attach(0));
  gl.uniform3f(splatShader.uniforms.color, color[0], color[1], color[2]);
  blit(dye.write);
  dye.swap();
}

function step(dt) {
  // Curl
  useProgram(curlShader);
  gl.uniform2f(curlShader.uniforms.texelSize, 1.0/simW, 1.0/simH);
  gl.uniform1i(curlShader.uniforms.uVelocity, velocity.read.attach(0));
  blit(curl);

  // Vorticity confinement
  useProgram(vorticityShader);
  gl.uniform2f(vorticityShader.uniforms.texelSize, 1.0/simW, 1.0/simH);
  gl.uniform1i(vorticityShader.uniforms.uVelocity, velocity.read.attach(0));
  gl.uniform1i(vorticityShader.uniforms.uCurl, curl.attach(1));
  gl.uniform1f(vorticityShader.uniforms.curl, CURL_STRENGTH);
  gl.uniform1f(vorticityShader.uniforms.dt, dt);
  blit(velocity.write);
  velocity.swap();

  // Divergence
  useProgram(divergenceShader);
  gl.uniform2f(divergenceShader.uniforms.texelSize, 1.0/simW, 1.0/simH);
  gl.uniform1i(divergenceShader.uniforms.uVelocity, velocity.read.attach(0));
  blit(divergence);

  // Clear pressure
  useProgram(clearShader);
  gl.uniform1i(clearShader.uniforms.uTexture, pressure.read.attach(0));
  gl.uniform1f(clearShader.uniforms.value, 0.8);
  blit(pressure.write);
  pressure.swap();

  // Pressure solve
  useProgram(pressureShader);
  gl.uniform2f(pressureShader.uniforms.texelSize, 1.0/simW, 1.0/simH);
  gl.uniform1i(pressureShader.uniforms.uDivergence, divergence.attach(0));
  for (let i = 0; i < PRESSURE_ITERATIONS; i++) {
    gl.uniform1i(pressureShader.uniforms.uPressure, pressure.read.attach(1));
    blit(pressure.write);
    pressure.swap();
  }

  // Gradient subtract
  useProgram(gradientSubtractShader);
  gl.uniform2f(gradientSubtractShader.uniforms.texelSize, 1.0/simW, 1.0/simH);
  gl.uniform1i(gradientSubtractShader.uniforms.uPressure, pressure.read.attach(0));
  gl.uniform1i(gradientSubtractShader.uniforms.uVelocity, velocity.read.attach(1));
  blit(velocity.write);
  velocity.swap();

  // Advect velocity
  useProgram(advectionShader);
  gl.uniform2f(advectionShader.uniforms.texelSize, 1.0/simW, 1.0/simH);
  gl.uniform1i(advectionShader.uniforms.uVelocity, velocity.read.attach(0));
  gl.uniform1i(advectionShader.uniforms.uSource, velocity.read.attach(0));
  gl.uniform1f(advectionShader.uniforms.dt, dt);
  gl.uniform1f(advectionShader.uniforms.dissipation, 0.98);
  blit(velocity.write);
  velocity.swap();

  // Advect dye
  gl.uniform2f(advectionShader.uniforms.texelSize, 1.0/dyeW, 1.0/dyeH);
  gl.uniform1i(advectionShader.uniforms.uVelocity, velocity.read.attach(0));
  gl.uniform1i(advectionShader.uniforms.uSource, dye.read.attach(1));
  gl.uniform1f(advectionShader.uniforms.dissipation, 0.97);
  blit(dye.write);
  dye.swap();
}

// --- Render loop ---
let lastTime = Date.now();
let frameCount = 0;

autoSplat();

// Random splats periodically
let nextAutoSplat = Date.now() + 3000 + Math.random() * 4000;

function render() {
  const now = Date.now();
  let dt = Math.min((now - lastTime) / 1000, 0.016666);
  lastTime = now;

  // Auto ambient splats
  if (now > nextAutoSplat) {
    const x = Math.random();
    const y = Math.random();
    const dx = (Math.random() - 0.5) * 600;
    const dy = (Math.random() - 0.5) * 600;
    splat(x, y, dx, dy, randomColor());
    nextAutoSplat = now + 4000 + Math.random() * 6000;
  }

  // Input splats
  for (const p of pointers) {
    if (p.down && p.moved) {
      splat(p.x, p.y, p.dx * 100, p.dy * 100, p.color);
      p.moved = false;
    }
  }

  step(dt);

  // Display
  useProgram(displayShader);
  gl.uniform2f(displayShader.uniforms.texelSize, 1.0/canvas.width, 1.0/canvas.height);
  gl.uniform1i(displayShader.uniforms.uTexture, dye.read.attach(0));
  blit(null);

  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
