<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIYA — Wave Interference</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#000;cursor:crosshair}
canvas{display:block;width:100vw;height:100vh}
#info{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);font-family:'Helvetica Neue',sans-serif;font-size:0.6rem;letter-spacing:0.4rem;color:rgba(255,255,255,0.3);pointer-events:none;z-index:10}
#controls{position:fixed;top:2rem;right:2rem;display:flex;flex-direction:column;gap:0.5rem;z-index:10}
button{padding:0.5rem 1rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);font-family:'Helvetica Neue',sans-serif;font-size:0.55rem;letter-spacing:0.2rem;cursor:pointer;border-radius:20px;transition:all 0.3s}
button:hover{background:rgba(255,255,255,0.15);color:#fff}
</style>
</head>
<body>
<div id="info">CLICK TO DROP WAVES</div>
<div id="controls">
  <button onclick="clearWaves()">CLEAR</button>
  <button onclick="changeColorMode()">COLORS</button>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl');
let W, H;
let mouse = { x: 0.5, y: 0.5 };
let sources = [];
let colorMode = 0;
const MAX_SOURCES = 20;

function resize() {
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  gl.viewport(0, 0, W, H);
}
window.addEventListener('resize', resize);
resize();

canvas.addEventListener('click', e => {
  const x = e.clientX / window.innerWidth;
  const y = 1.0 - e.clientY / window.innerHeight;
  sources.push({ x, y, time: performance.now() / 1000 });
  if (sources.length > MAX_SOURCES) sources.shift();
});

canvas.addEventListener('mousemove', e => {
  mouse.x = e.clientX / window.innerWidth;
  mouse.y = 1.0 - e.clientY / window.innerHeight;
});

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const x = t.clientX / window.innerWidth;
    const y = 1.0 - t.clientY / window.innerHeight;
    sources.push({ x, y, time: performance.now() / 1000 });
    if (sources.length > MAX_SOURCES) sources.shift();
  }
}, { passive: false });

function clearWaves() { sources = []; }
function changeColorMode() { colorMode = (colorMode + 1) % 4; }

// Add initial sources
sources.push({ x: 0.3, y: 0.5, time: 0 });
sources.push({ x: 0.7, y: 0.5, time: 0 });

const vertSrc = `attribute vec2 pos; void main(){ gl_Position = vec4(pos,0,1); }`;
const fragSrc = `
precision highp float;
uniform vec2 u_resolution;
uniform float u_time;
uniform vec2 u_mouse;
uniform int u_colorMode;
uniform int u_numSources;
uniform vec3 u_sources[20]; // x, y, birthTime

vec3 hsl2rgb(float h, float s, float l) {
  vec3 rgb = clamp(abs(mod(h*6.0+vec3(0.0,4.0,2.0),6.0)-3.0)-1.0, 0.0, 1.0);
  return l + s * (rgb - 0.5) * (1.0 - abs(2.0*l - 1.0));
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_resolution;
  float aspect = u_resolution.x / u_resolution.y;

  float totalWave = 0.0;
  float totalAbs = 0.0;
  float freq = 40.0;
  float speed = 3.0;

  for(int i = 0; i < 20; i++) {
    if(i >= u_numSources) break;
    vec2 src = u_sources[i].xy;
    float birthTime = u_sources[i].z;
    float age = u_time - birthTime;
    if(age < 0.0) continue;

    vec2 d = (uv - src) * vec2(aspect, 1.0);
    float dist = length(d);

    float wave = sin(dist * freq - age * speed);
    // Decay with distance and age
    float decay = exp(-dist * 2.0) * exp(-age * 0.15);
    // Wavefront
    float front = smoothstep(0.0, 0.1, age * speed * 0.05 - dist * 0.3);

    totalWave += wave * decay * front;
    totalAbs += abs(wave) * decay * front;
  }

  vec3 color;

  // Mouse hover wave
  vec2 md = (uv - u_mouse) * vec2(aspect, 1.0);
  float mDist = length(md);
  float mWave = sin(mDist * 60.0 - u_time * 4.0) * exp(-mDist * 5.0) * 0.3;
  totalWave += mWave;

  if(u_colorMode == 0) {
    // Ocean blue
    vec3 pos_col = vec3(0.1, 0.4, 0.8);
    vec3 neg_col = vec3(0.0, 0.1, 0.3);
    vec3 peak_col = vec3(0.8, 0.95, 1.0);
    color = mix(neg_col, pos_col, totalWave * 0.5 + 0.5);
    color += peak_col * max(totalWave - 0.5, 0.0) * 1.5;
  } else if(u_colorMode == 1) {
    // Rainbow interference
    float h = totalWave * 0.5 + 0.5;
    color = hsl2rgb(h + u_time * 0.02, 0.8, 0.3 + totalAbs * 0.4);
  } else if(u_colorMode == 2) {
    // Thermal
    float v = totalWave * 0.5 + 0.5;
    color = mix(vec3(0.0, 0.0, 0.2), vec3(0.8, 0.0, 0.3), v);
    color = mix(color, vec3(1.0, 0.9, 0.1), max(v - 0.6, 0.0) * 2.5);
    color = mix(color, vec3(1.0), max(v - 0.85, 0.0) * 6.0);
  } else {
    // Monochrome elegant
    float v = totalWave;
    color = vec3(0.9, 0.95, 1.0) * (v * 0.5 + 0.5);
    color *= color; // contrast
    color += vec3(0.02, 0.03, 0.06); // lift blacks
  }

  // Vignette
  float vig = 1.0 - smoothstep(0.4, 1.2, length(uv - 0.5) * 1.5);
  color *= vig;

  gl_FragColor = vec4(color, 1.0);
}
`;

function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, createShader(gl.VERTEX_SHADER, vertSrc));
gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, fragSrc));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const posA = gl.getAttribLocation(prog, 'pos');
gl.enableVertexAttribArray(posA);
gl.vertexAttribPointer(posA, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'u_resolution');
const uTime = gl.getUniformLocation(prog, 'u_time');
const uMouse = gl.getUniformLocation(prog, 'u_mouse');
const uColorMode = gl.getUniformLocation(prog, 'u_colorMode');
const uNumSources = gl.getUniformLocation(prog, 'u_numSources');
const uSources = [];
for (let i = 0; i < MAX_SOURCES; i++) {
  uSources.push(gl.getUniformLocation(prog, 'u_sources[' + i + ']'));
}

let startT = performance.now() / 1000;

function render() {
  const t = performance.now() / 1000;

  gl.uniform2f(uRes, W, H);
  gl.uniform1f(uTime, t);
  gl.uniform2f(uMouse, mouse.x, mouse.y);
  gl.uniform1i(uColorMode, colorMode);
  gl.uniform1i(uNumSources, sources.length);

  for (let i = 0; i < MAX_SOURCES; i++) {
    if (i < sources.length) {
      gl.uniform3f(uSources[i], sources[i].x, sources[i].y, sources[i].time);
    } else {
      gl.uniform3f(uSources[i], 0, 0, 99999);
    }
  }

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
