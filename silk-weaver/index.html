<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIYA — Silk Weaver</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#0a0a12;cursor:crosshair}
canvas{display:block}
#info{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);font-family:'Helvetica Neue',sans-serif;font-size:0.6rem;letter-spacing:0.4rem;color:rgba(255,255,255,0.25);pointer-events:none;z-index:10;transition:opacity 2s}
#info.hide{opacity:0}
#controls{position:fixed;top:2rem;right:2rem;display:flex;flex-direction:column;gap:0.5rem;z-index:10}
button{padding:0.5rem 1rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);font-family:'Helvetica Neue',sans-serif;font-size:0.55rem;letter-spacing:0.2rem;cursor:pointer;border-radius:20px;transition:all 0.3s}
button:hover{background:rgba(255,255,255,0.15);color:#fff}
</style>
</head>
<body>
<div id="info">MOVE YOUR CURSOR TO WEAVE</div>
<div id="controls">
  <button onclick="clearCanvas()">CLEAR</button>
  <button onclick="changeMode()">MODE</button>
  <button onclick="saveImage()">SAVE</button>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const info = document.getElementById('info');
let W, H;

function resize() {
  const img = ctx.getImageData(0, 0, canvas.width || 1, canvas.height || 1);
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);
  if (img.width > 1) ctx.putImageData(img, 0, 0);
}
window.addEventListener('resize', resize);
resize();

let mouse = { x: W/2, y: H/2, px: W/2, py: H/2 };
let points = [];
let hue = 0;
let mode = 0;
const modes = ['silk', 'aurora', 'crystal'];
let moved = false;

document.addEventListener('mousemove', e => {
  mouse.px = mouse.x;
  mouse.py = mouse.y;
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  if (!moved) { moved = true; info.classList.add('hide'); }
});

document.addEventListener('touchmove', e => {
  e.preventDefault();
  mouse.px = mouse.x;
  mouse.py = mouse.y;
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  if (!moved) { moved = true; info.classList.add('hide'); }
}, { passive: false });

function clearCanvas() {
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);
  points = [];
}

function changeMode() {
  mode = (mode + 1) % modes.length;
}

function saveImage() {
  const a = document.createElement('a');
  a.download = 'silk-weaver.png';
  a.href = canvas.toDataURL();
  a.click();
}

function drawSilk() {
  const speed = Math.sqrt(
    (mouse.x - mouse.px) ** 2 + (mouse.y - mouse.py) ** 2
  );
  if (speed < 0.5) return;

  points.push({ x: mouse.x, y: mouse.y, age: 0 });
  if (points.length > 80) points.shift();

  hue = (hue + 0.3) % 360;

  ctx.globalCompositeOperation = 'lighter';

  for (let i = 0; i < points.length - 1; i++) {
    const a = points[i];
    const b = points[points.length - 1];
    const alpha = (1 - i / points.length) * 0.08;
    const h = (hue + i * 3) % 360;

    ctx.beginPath();
    ctx.moveTo(a.x, a.y);

    // Bezier curve through midpoint with offset
    const mx = (a.x + b.x) / 2 + (Math.random() - 0.5) * 20;
    const my = (a.y + b.y) / 2 + (Math.random() - 0.5) * 20;
    ctx.quadraticCurveTo(mx, my, b.x, b.y);

    ctx.strokeStyle = `hsla(${h}, 70%, 60%, ${alpha})`;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Mirror
    ctx.beginPath();
    ctx.moveTo(W - a.x, a.y);
    ctx.quadraticCurveTo(W - mx, my, W - b.x, b.y);
    ctx.strokeStyle = `hsla(${(h+180)%360}, 70%, 60%, ${alpha * 0.7})`;
    ctx.stroke();
  }

  ctx.globalCompositeOperation = 'source-over';
}

function drawAurora() {
  const speed = Math.sqrt(
    (mouse.x - mouse.px) ** 2 + (mouse.y - mouse.py) ** 2
  );
  if (speed < 0.5) return;

  points.push({ x: mouse.x, y: mouse.y });
  if (points.length > 100) points.shift();

  hue = (hue + 0.5) % 360;
  ctx.globalCompositeOperation = 'lighter';

  const n = points.length;
  for (let j = 0; j < 5; j++) {
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const p = points[i];
      const offset = Math.sin(i * 0.2 + j * 1.2) * (20 + j * 15);
      const x = p.x;
      const y = p.y + offset;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    const h = (hue + j * 40) % 360;
    ctx.strokeStyle = `hsla(${h}, 80%, 55%, 0.04)`;
    ctx.lineWidth = 8 + j * 4;
    ctx.stroke();
  }

  ctx.globalCompositeOperation = 'source-over';
}

function drawCrystal() {
  const speed = Math.sqrt(
    (mouse.x - mouse.px) ** 2 + (mouse.y - mouse.py) ** 2
  );
  if (speed < 1) return;

  hue = (hue + 1) % 360;
  ctx.globalCompositeOperation = 'lighter';

  const cx = W / 2, cy = H / 2;
  const sides = 6;

  for (let s = 0; s < sides; s++) {
    const angle = (s / sides) * Math.PI * 2;
    const cos_a = Math.cos(angle), sin_a = Math.sin(angle);

    // Transform mouse position relative to center
    const dx = mouse.x - cx, dy = mouse.y - cy;
    const rx = dx * cos_a - dy * sin_a + cx;
    const ry = dx * sin_a + dy * cos_a + cy;

    const pdx = mouse.px - cx, pdy = mouse.py - cy;
    const prx = pdx * cos_a - pdy * sin_a + cx;
    const pry = pdx * sin_a + pdy * cos_a + cy;

    ctx.beginPath();
    ctx.moveTo(prx, pry);
    ctx.lineTo(rx, ry);

    const h = (hue + s * 60) % 360;
    ctx.strokeStyle = `hsla(${h}, 80%, 60%, 0.3)`;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Glow
    ctx.beginPath();
    ctx.arc(rx, ry, 3, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${h}, 80%, 70%, 0.15)`;
    ctx.fill();
  }

  ctx.globalCompositeOperation = 'source-over';
}

function render() {
  // Subtle fade for trails
  ctx.fillStyle = 'rgba(10, 10, 18, 0.005)';
  ctx.fillRect(0, 0, W, H);

  if (modes[mode] === 'silk') drawSilk();
  else if (modes[mode] === 'aurora') drawAurora();
  else drawCrystal();

  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
